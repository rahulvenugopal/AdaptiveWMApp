name: Flutter Autobuild

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-android-linux:
    name: Build Android & Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Strip macOS Java Home from gradle.properties
        run: sed -i '/org.gradle.java.home/d' adaptive_wmapp_flutter/android/gradle.properties

      - name: Install Linux Build Dependencies
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
        
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b
          
      - name: Install Flutter Dependencies
        working-directory: ./adaptive_wmapp_flutter
        run: flutter pub get
        
      - name: Build Android APK
        working-directory: ./adaptive_wmapp_flutter
        run: flutter build apk --release
        
      - name: Build Linux
        working-directory: ./adaptive_wmapp_flutter
        run: flutter build linux --release
        
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: adaptive_wmapp_flutter/build/app/outputs/flutter-apk/app-release.apk
          
      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Build
          path: adaptive_wmapp_flutter/build/linux/x64/release/bundle/

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Strip macOS Java Home from gradle.properties
        run: sed -i '' '/org.gradle.java.home/d' adaptive_wmapp_flutter/android/gradle.properties
        
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Flutter Dependencies
        working-directory: ./adaptive_wmapp_flutter
        run: flutter pub get
        
      - name: Build iOS (No Sign)
        working-directory: ./adaptive_wmapp_flutter
        run: flutter build ios --release --no-codesign
        
      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Build
          path: adaptive_wmapp_flutter/build/ios/iphoneos/
